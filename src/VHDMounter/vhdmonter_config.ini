; Repository-tracked default template for VHDMounter.
; Override these values locally per machine after deployment when needed.

[Settings]
; 服务端 URL 前缀。客户端会基于这个前缀自行拼接固定端点：
; /api/boot-image-select
; /api/evhd-envelope
; /api/protect
; /ws/machine-log
ServerBaseUrl=http://127.0.0.1:8080

; 是否启用远程VHD选择功能 (true/false)
EnableRemoteSelection=false

; 预配置注册证书（PFX）路径，用于签名机台公钥注册请求
RegistrationCertificatePath=

; 预配置注册证书密码
RegistrationCertificatePassword=

; 机台ID (用于识别当前机台)
MachineId=MACHINE_001

; 是否启用保护检查功能 (true/false)
EnableProtectionCheck=false

; 保护检查间隔 (毫秒)
ProtectionCheckInterval=500

; 是否启用机台日志上报
EnableLogUpload=false

; 机台日志上传批间隔（毫秒）
MachineLogUploadIntervalMs=3000

; 机台日志每批最多上传条数
MachineLogUploadBatchSize=200

; 机台日志本地待上传 spool 最大字节数
MachineLogUploadMaxSpoolBytes=52428800