name: build

on:
  push:
    branches:
      - main
      - dev
      - maimoller_control_test
    tags:
      - "*"
    paths:
      - 'src/**'
      - 'Updater/**'
      - 'VHDMountAdminTools/**'
      - '**.csproj'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: |
          dotnet restore ./VHDMounter.csproj
          dotnet restore ./VHDMounter.csproj -p:EnableHidMenuFeatures=true
          dotnet restore ./Updater/Updater.csproj
          dotnet restore ./VHDMountAdminTools/VHDMountAdminTools.csproj
        shell: pwsh
      - name: Publish VHDMounter Base
        run: dotnet publish ./VHDMounter.csproj -c Release -r win-x64 -p:EnableHidMenuFeatures=false -o ./artifacts/publish/VHDMounter
        shell: pwsh
      - name: Publish VHDMounter Maimoller
        run: dotnet publish ./VHDMounter.csproj -c Release -r win-x64 -p:EnableHidMenuFeatures=true -o ./artifacts/publish/VHDMounter_Maimoller
        shell: pwsh
      - name: Publish Updater
        run: dotnet publish ./Updater/Updater.csproj -c Release -r win-x64
        shell: pwsh
      - name: Publish VHDMountAdminTools
        run: dotnet publish ./VHDMountAdminTools/VHDMountAdminTools.csproj -c Release -r win-x64
        shell: pwsh
      - name: Zip artifacts
        run: |
          New-Item -ItemType Directory -Force -Path ./artifacts | Out-Null
          Compress-Archive -Path ./artifacts/publish/VHDMounter/* -DestinationPath ./artifacts/VHDMounter-win-x64.zip -Force
          Compress-Archive -Path ./artifacts/publish/VHDMounter_Maimoller/* -DestinationPath ./artifacts/VHDMounter_Maimoller-win-x64.zip -Force
          Compress-Archive -Path ./Updater/bin/Release/net8.0-windows/win-x64/publish -DestinationPath ./artifacts/Updater-win-x64.zip -Force
          Compress-Archive -Path ./VHDMountAdminTools/bin/Release/net8.0-windows/win-x64/publish -DestinationPath ./artifacts/VHDMountAdminTools-win-x64.zip -Force
        shell: pwsh
      - name: Upload VHDMounter artifact
        uses: actions/upload-artifact@v4
        with:
          name: VHDMounter-win-x64
          path: artifacts/VHDMounter-win-x64.zip
      - name: Upload VHDMounter Maimoller artifact
        uses: actions/upload-artifact@v4
        with:
          name: VHDMounter_Maimoller-win-x64
          path: artifacts/VHDMounter_Maimoller-win-x64.zip
      - name: Upload Updater artifact
        uses: actions/upload-artifact@v4
        with:
          name: Updater-win-x64
          path: artifacts/Updater-win-x64.zip
      - name: Upload VHDMountAdminTools artifact
        uses: actions/upload-artifact@v4
        with:
          name: VHDMountAdminTools-win-x64
          path: artifacts/VHDMountAdminTools-win-x64.zip
      - name: Generate checksums
        run: |
          $out = "./artifacts/CHECKSUMS.sha256"
          if (Test-Path $out) { Remove-Item -Force $out }
          Get-ChildItem ./artifacts/*.zip | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash)  $($_.Name)" | Add-Content $out
          }
        shell: pwsh
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/VHDMounter-win-x64.zip
            artifacts/VHDMounter_Maimoller-win-x64.zip
            artifacts/Updater-win-x64.zip
            artifacts/VHDMountAdminTools-win-x64.zip
            artifacts/CHECKSUMS.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
