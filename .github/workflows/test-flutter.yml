name: Tests (Flutter)

on:
  push:
    branches: [main, dev, feature/software-deployment, maimoller_control_test]
    paths:
      - 'vhd_mount_admin_flutter/**'
      - '.github/workflows/test-flutter.yml'
  pull_request:
    branches: [main, dev, feature/software-deployment, maimoller_control_test]
    paths:
      - 'vhd_mount_admin_flutter/**'
      - '.github/workflows/test-flutter.yml'
  workflow_dispatch:

jobs:
  flutter-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Get dependencies
        run: cd vhd_mount_admin_flutter && flutter pub get
      - name: Analyze
        run: cd vhd_mount_admin_flutter && flutter analyze
      - name: Run tests
        run: cd vhd_mount_admin_flutter && flutter test
