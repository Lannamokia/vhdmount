name: VHDSelectServer Docker Build & Release

on:
  push:
    branches:
      - main
      - dev
      - maimoller_control_test
    paths:
      - 'VHDSelectServer/**'
      - '.github/workflows/docker-image.yml'
  pull_request:
    branches:
      - main
      - dev
      - maimoller_control_test
    paths:
      - 'VHDSelectServer/**'
      - '.github/workflows/docker-image.yml'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_artifact:
    name: Build image and upload artifact (on changes)
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: |
          echo "image=vhd-select-server" >> $GITHUB_OUTPUT
          echo "tag=ci-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }} VHDSelectServer

      - name: Export and compress image as tgz
        run: |
          docker save ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }} | gzip > ${{ steps.vars.outputs.image }}-${{ steps.vars.outputs.tag }}.tgz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vhd-select-server-image-${{ steps.vars.outputs.tag }}
          path: ${{ steps.vars.outputs.image }}-${{ steps.vars.outputs.tag }}.tgz

  release_push:
    name: Tag and push to DockerHub (on release)
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKER_IMAGE_NAME: vhd-select-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VER="${TAG#v}"
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Validate DockerHub credentials
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${DOCKERHUB_USERNAME:-}" ]; then
            echo "::error::Missing Actions variable DOCKERHUB_USERNAME."
            exit 1
          fi

          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Missing repository secret DOCKERHUB_TOKEN."
            exit 1
          fi

      - name: Build image with release tag
        run: |
          docker build -t ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:${{ steps.version.outputs.version }} VHDSelectServer

      - name: Tag image as latest
        run: |
          docker tag ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:${{ steps.version.outputs.version }} ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:latest

      - name: DockerHub login
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to DockerHub
        run: |
          docker push ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:${{ steps.version.outputs.version }}
          docker push ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:latest

      - name: Export and compress image as tgz
        run: |
          docker save ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:${{ steps.version.outputs.version }} | gzip > vhd-select-server-${{ steps.version.outputs.version }}.tgz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vhd-select-server-image-${{ steps.version.outputs.version }}
          path: vhd-select-server-${{ steps.version.outputs.version }}.tgz